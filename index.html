<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUCKME/FUCKYOU</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="logo">
        <h1>FUCKME/FUCKYOU</h1>
    </div>
    
    <!-- Global webcam - always visible -->
    <video id="webcam" autoplay playsinline muted></video>
    
    <div class="container">
        <div class="status" id="status"></div>
        
        <!-- Page 1: Language Selection -->
        <div class="page" id="page1">
            <div class="section">
                <!-- Language Selection with text links -->
                <div class="language-links">
                    <a href="#" id="englishBtn" class="language-link">ENGLISH</a>
                    <a href="#" id="germanBtn" class="language-link">DEUTSCH</a>
                </div>
                
                <!-- Next button removed as per request -->
            </div>
        </div>
        
        <!-- Page Mode: Roast or Love -->
        <div class="page" id="pageMode" style="display: none;">
            <div class="section">
                <div class="language-links mode-links">
                    <a href="#" id="roastBtn" class="language-link mode-link">
                        <svg class="mode-icon" id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 114.3 122.88"><title>fire</title><path d="M19.19,34.8c2.3,16.33,5.87,28.71,11.91,33.28a92.1,92.1,0,0,1,1.74-16.32c3.49-17.46,9.1-18.4,14.5-31.3A33.25,33.25,0,0,0,49.11,0C68.46,3.35,86.43,32.52,90.94,69.61a39.51,39.51,0,0,0,8.24-22c8.54,8.73,12.77,19.12,14.35,30.52,3.2,21.83-3.5,36-21.21,41.57,3.94-9,3-16-1.1-25.26A32.7,32.7,0,0,0,84.31,84.3c-1.26,9-3.21,15.75-6.53,18.26a51.28,51.28,0,0,0-1-9c-1.92-9.58-5-10.09-8-17.17a18.24,18.24,0,0,1-1-11.23c-10.61,1.84-20.47,17.85-23,38.2a21.73,21.73,0,0,1-4.52-12.06,28.8,28.8,0,0,0-7.88,16.75c-.88,6-.39,11,1.55,14.79-13.62-1.56-22.75-9.15-28.52-21.4-8.29-17.54-6.81-30.62,1-48.15A59.91,59.91,0,0,1,19.19,34.8Z"/></svg>
                        <span>ROAST</span>
                    </a>
                    <a href="#" id="loveBtn" class="language-link mode-link">
                        <svg class="mode-icon" version="1.1" id="Layer_1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px" viewBox="0 0 122.88 107.41" style="enable-background:new 0 0 122.88 107.41" xml:space="preserve"><style type="text/css">.st0{fill-rule:evenodd;clip-rule:evenodd;}</style><g><path class="st0" d="M60.83,17.19C68.84,8.84,74.45,1.62,86.79,0.21c23.17-2.66,44.48,21.06,32.78,44.41 c-3.33,6.65-10.11,14.56-17.61,22.32c-8.23,8.52-17.34,16.87-23.72,23.2l-17.4,17.26L46.46,93.56C29.16,76.9,0.95,55.93,0.02,29.95 C-0.63,11.75,13.73,0.09,30.25,0.3C45.01,0.5,51.22,7.84,60.83,17.19L60.83,17.19L60.83,17.19z"/></g></svg>
                        <span>LOVE</span>
                    </a>
                </div>
            </div>
        </div>
        
        <!-- Page 2: Record Voice -->
        <div class="page" id="page2" style="display: none;">
            <div class="section">
                <!-- Welcome text centered like a poem -->
                <div class="welcome-text-container">
                    <p id="welcomeText" class="welcome-text"></p>
                </div>
                
                <!-- Large white record button beneath the text -->
                <div class="record-button-container">
                    <button id="recordBtn" class="record-btn">START</button>
                    <div class="progress-container" id="recordingProgress" style="display: none;">
                        <div class="progress-bar" id="recordingProgressBar"></div>
                        <div class="progress-text" id="recordingProgressText">0s</div>
                    </div>
                </div>
                
                <!-- Hidden audio element for storing the recorded audio (controls removed) -->
                <div class="audio-preview" style="display: none;">
                    <audio id="sampleAudio"></audio>
                </div>
                
                <!-- Next button removed as per request -->
            </div>
        </div>
        
        <!-- Page 3: Webcam Image Capture with Countdown -->
        <div class="page" id="page3" style="display: none;">
            <div class="section">
                <div class="image-capture-container">
                    <!-- Webcam container (uses global webcam) -->
                    <div class="webcam-container">
                    </div>
                    
                    <div class="preview-container">
                        <img id="imagePreview" class="media-preview">
                    </div>
                    <!-- Countdown overlay - positioned in the center of the screen -->
                    <div id="countdown" class="countdown-overlay" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9999; font-size: 12rem; color: white; display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; text-align: center;">5</div>
                </div>
            </div>
        </div>
        
        <!-- Page 4: Output (Roast and Generated Voice) -->
        <div class="page" id="page4" style="display: none;">
            <div class="section">
                <div class="progress-container" id="roastingProgress" style="display: none;">
                    <div class="progress-bar" id="roastingProgressBar"></div>
                    <div class="progress-text">Analyzing image...</div>
                </div>
                
                <!-- Image preview -->
                <div class="result-image-container">
                    <img id="resultImagePreview" class="result-image">
                </div>
                
                <!-- Output section as copyable text -->
                <div class="output-section">
                    <p id="roastText" class="copyable-text"></p>
                </div>
                
                <!-- Minimal audio player -->
                <div class="audio-row">
                    <div class="minimal-player">
                        <div class="minimal-progress-container">
                            <div class="minimal-progress-bar" id="minimalProgressBar"></div>
                        </div>
                        <audio id="generatedAudio" style="display: none;"></audio>
                    </div>
                </div>
                
                <!-- Action buttons -->
                <div class="action-buttons-container">
                    <button id="playAgainBtn" class="speak-btn">PLAY AGAIN</button>
                    <button id="restartBtn" class="speak-btn secondary-btn">RESTART</button>
                </div>
                <div class="progress-container" id="generatingProgress" style="display: none;">
                    <div class="progress-bar" id="generatingProgressBar"></div>
                    <div class="progress-text">Processing...</div>
                </div>
                
                <!-- Navigation buttons removed as per request -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
